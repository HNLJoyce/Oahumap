<style>
:root {
  --bg:#f7f9fc; --panel:#ffffff; --ink:#172033; --muted:#5f6b7a; --line:#dbe3ef;

}
html,body {height:100%; margin:0; font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--ink); background:var(--bg);}
.app {height:100%; display:grid; grid-template-columns:minmax(0,1fr) 390px; grid-template-rows:auto 1fr;}
header {grid-column:1/-1; padding:18px 22px; background:linear-gradient(90deg,#0f172a,#1e3a8a); color:white; display:flex; justify-content:space-between; gap:20px; align-items:center;}
h1 {margin:0; font-size:clamp(22px,3vw,36px); letter-spacing:-.03em;}
.subtitle {color:rgba(255,255,255,.82); font-size:14px; margin-top:4px;}
.header-actions {display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end;}
.small-chip {border:1px solid rgba(255,255,255,.28); background:rgba(255,255,255,.12); border-radius:999px; padding:7px 10px; font-size:12px; font-weight:700;}
.mobile-panel-btn {display:none; border:1px solid rgba(255,255,255,.32); background:rgba(255,255,255,.14); color:white; border-radius:999px; padding:8px 11px; font-size:12px; font-weight:800;}
#map {min-height:720px; height:100%; width:100%; background:#bfdbfe;}
.leaflet-tile-pane {filter:saturate(1.45) contrast(1.12) brightness(1.02);}
aside {background:var(--panel); border-left:1px solid var(--line); overflow:auto; padding:16px;}
.panel-title {margin:0 0 8px 0; font-size:18px;}
.search {width:100%; box-sizing:border-box; border:1px solid var(--line); border-radius:12px; padding:10px 12px; font-size:14px; margin-bottom:10px;}
.controls {display:grid; grid-template-columns:1fr; gap:8px; margin-bottom:12px;}
select,button {border:1px solid var(--line); border-radius:12px; background:white; padding:9px 10px; font-size:13px;}
button {cursor:pointer; font-weight:800;}
.week-strip {display:grid; grid-template-columns:1fr; gap:7px; margin:10px 0 12px;}
.week-btn {text-align:left; background:#f8fafc;}
.week-btn.active {background:#0f172a; color:white; border-color:#0f172a;}
.agency-toggle {display:flex; gap:8px;}
.agency-toggle button {flex:1;}
.agency-toggle button.active[data-agency="DFM"] {background:var(--dfm); color:#111827; border-color:#b7791f;}
.agency-toggle button.active[data-agency="DLNR"] {background:var(--dlnr); color:#fff; border-color:var(--dlnr);}
.summary {border:1px solid var(--line); border-radius:14px; padding:10px 12px; background:#f8fafc; font-size:12px; line-height:1.35; color:var(--muted); margin-bottom:12px;}
.op-list {display:grid; gap:9px;}
.op-card {border:1px solid var(--line); border-left:7px solid #64748b; border-radius:14px; padding:10px 11px; background:white; cursor:pointer; transition:.15s ease;}
.op-card:hover {box-shadow:0 8px 18px rgba(15,23,42,.09); transform:translateY(-1px);}
.op-name {font-weight:900; font-size:14px; line-height:1.25;}
.op-meta {color:var(--muted); font-size:12px; line-height:1.35; margin-top:4px;}
.marker-dot {width:18px; height:18px; border-radius:50%; border:3px solid white; box-shadow:0 0 0 5px rgba(15,23,42,.08),0 8px 18px rgba(15,23,42,.22); position:relative;}
.marker-dot::after {content:attr(data-label); position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); color:#fff; font-size:9px; font-weight:900;}
.marker-dot[data-label="C"]::after {color:#111827;}
.line-label-dot {height:18px; min-width:34px; padding:0 6px; border-radius:999px; border:2px solid #fff; color:#fff; font-size:10px; line-height:18px; font-weight:900; text-align:center; box-shadow:0 0 0 4px rgba(15,23,42,.08),0 8px 18px rgba(15,23,42,.22); white-space:nowrap;}
.hover-tooltip {width:420px; max-width:420px; min-width:330px; white-space:normal; background:#0f172a; color:#fff; border:0; border-radius:13px; padding:12px 14px; box-shadow:0 12px 30px rgba(15,23,42,.30); line-height:1.35;}
.hover-title {font-weight:900; font-size:15px; margin-bottom:7px; letter-spacing:-.01em;}
.hover-grid {display:grid; grid-template-columns:82px minmax(0,1fr); column-gap:8px; row-gap:4px; align-items:start;}
.hover-label {color:#cbd5e1; font-weight:800; font-size:12px; white-space:nowrap;}
.hover-value {color:#fff; font-size:12px; overflow-wrap:anywhere;}
.leaflet-popup-content {font-size:13px; line-height:1.4; min-width:250px;}
.popup-title {font-weight:900; font-size:15px; margin-bottom:5px;}
.popup-row {margin:3px 0;}
.popup-label {color:var(--muted); font-weight:700;}
.panel-close,.panel-backdrop {display:none;}
@media (max-width:980px) {
  html,body {height:100%; overflow:hidden;}
  .app {height:100dvh; min-height:100dvh; display:grid; grid-template-columns:1fr; grid-template-rows:auto minmax(0,1fr);}
  header {align-items:flex-start; flex-direction:column; padding:12px 14px; gap:10px;}
  h1 {font-size:20px; line-height:1.15;}
  .subtitle {font-size:12px;}
  .header-actions {width:100%; justify-content:flex-start; gap:6px;}
  .small-chip {font-size:11px; padding:6px 8px;}
  .mobile-panel-btn {display:inline-flex; align-items:center; justify-content:center; min-height:36px;}
  #map {height:100%; min-height:0;}
  aside {position:fixed; left:0; right:0; bottom:0; z-index:2000; max-height:78dvh; min-height:42dvh; overflow:auto; border-left:0; border-top:1px solid var(--line); border-radius:18px 18px 0 0; box-shadow:0 -18px 44px rgba(15,23,42,.24); transform:translateY(calc(100% - 62px)); transition:transform .22s ease; padding:14px; -webkit-overflow-scrolling:touch;}
  aside.open {transform:translateY(0);}
  .panel-close {display:block; float:right; border:1px solid var(--line); background:#fff; border-radius:999px; padding:7px 10px; font-size:12px; font-weight:800; margin:0 0 8px 8px; min-height:36px;}
  .panel-backdrop {display:none; position:fixed; inset:0; z-index:1999; background:rgba(15,23,42,.28);}
  .panel-backdrop.open {display:block;}
  .search,select {min-height:44px; font-size:16px;}
  .hover-tooltip {display:none!important;}
}
</style>
</head>

function routePathFor(op) {
  const hay = `${op.location || ''} ${op.matched || ''}`.toLowerCase();
  const entries = Object.entries(routePaths).sort((a,b)=>b[0].length-a[0].length);
  for (const [key, path] of entries) {
    if (hay.includes(key.toLowerCase())) return {key, path};
  }
  if (/\bst\.?\b|street|ave\.?|avenue|blvd\.?|boulevard|rd\.?|road|ln\.?|lane|pl\.?|place|bridge|bike path|promenade|canal/.test(hay)) {
    const d = 0.0012;
    return {key: op.matched || op.location, path: [[op.lat-d, op.lng-d],[op.lat, op.lng],[op.lat+d, op.lng+d]]};
  }
  return null;
}

function lineStyleFor(op) {
  const color = agencyColors[op.agency] || '#64748b';
  return {color, weight: op.agency === 'DFM' ? 6 : 5, opacity: op.agency === 'DFM' ? 0.95 : 0.84, lineCap:'round', lineJoin:'round'};
}

function makeLineMarkerIcon(op) {
  const color = agencyColors[op.agency] || '#64748b';
  const textColor = op.agency === 'DFM' ? '#111827' : '#ffffff';
  const borderColor = op.agency === 'DFM' ? '#b7791f' : '#ffffff';
  return L.divIcon({className:'', html:`<div class="line-label-dot" style="background:${color}; color:${textColor}; border-color:${borderColor}">${op.agency}</div>`, iconSize:[42,20], iconAnchor:[21,10], popupAnchor:[0,-8]});
}
function midpoint(path) { return path[Math.floor(path.length/2)]; }

let map, markerLayer, markers = new Map();
let activeAgencies = new Set(['DFM','DLNR']);
function escapeHtml(value) { return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch])); }
function initMap() {
  map = L.map('map', {center:[21.4389,-157.9950], zoom:10, scrollWheelZoom:true});
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, attribution:'&copy; OpenStreetMap contributors'}).addTo(map);
  markerLayer = L.layerGroup().addTo(map);
  renderControls(); renderOperations();
  setTimeout(()=>map.invalidateSize(),250);
}
function markerIcon(op) {
  const color = agencyColors[op.agency] || '#64748b';
  const label = op.agency === 'DFM' ? 'C' : 'S';
  return L.divIcon({className:'', html:`<div class="marker-dot" data-label="${label}" style="background:${color}"></div>`, iconSize:[26,26], iconAnchor:[13,13], popupAnchor:[0,-10]});
}
function popupHtml(op) { return `<div class="popup-title">${escapeHtml(op.location)}</div>
  <div class="popup-row"><span class="popup-label">Agency:</span> ${escapeHtml(op.agency)} ${op.agency==='DFM'?'(City DFM)':'(State DLNR)'}</div>
  <div class="popup-row"><span class="popup-label">Date:</span> ${escapeHtml(op.date)} · ${escapeHtml(op.week)}</div>
  ${op.crew ? `<div class="popup-row"><span class="popup-label">Crew:</span> ${escapeHtml(op.crew)}</div>` : ''}
  <div class="popup-row"><span class="popup-label">Mapped as:</span> ${escapeHtml(op.matched)}</div>
  <div class="popup-row"><span class="popup-label">Notes:</span> ${escapeHtml(op.notes)}</div>`; }
function tooltipHtml(op) { return `<div class="hover-title">${escapeHtml(op.location)}</div><div class="hover-grid">
  <div class="hover-label">Agency</div><div class="hover-value">${escapeHtml(op.agency)} ${op.agency==='DFM'?'City':'State'}</div>
  <div class="hover-label">Date</div><div class="hover-value">${escapeHtml(op.date)} · ${escapeHtml(op.week)}</div>
  ${op.crew ? `<div class="hover-label">Crew</div><div class="hover-value">${escapeHtml(op.crew)}</div>` : ''}
  <div class="hover-label">Mapped</div><div class="hover-value">${escapeHtml(op.matched)}</div>
  <div class="hover-label">Notes</div><div class="hover-value">${escapeHtml(op.notes)}</div>
</div>`; }
function renderControls() {
  const weekFilter=document.getElementById('weekFilter');
  weeks.forEach(w=>{let opt=document.createElement('option'); opt.value=w; opt.textContent=w; weekFilter.appendChild(opt);});
  document.getElementById('searchBox').addEventListener('input', renderOperations);
  weekFilter.addEventListener('change', renderOperations);
  document.getElementById('agencyFilter').addEventListener('change', e=>{activeAgencies=new Set(e.target.value?[e.target.value]:['DFM','DLNR']); syncQuick(); renderOperations();});
  document.getElementById('resetBtn').addEventListener('click',()=>{document.getElementById('searchBox').value=''; weekFilter.value=''; document.getElementById('agencyFilter').value=''; activeAgencies=new Set(['DFM','DLNR']); syncQuick(); renderOperations();});
  document.getElementById('fitBtn').addEventListener('click', fitVisible);
  document.getElementById('dfmQuick').addEventListener('click',()=>toggleAgency('DFM'));
  document.getElementById('dlnrQuick').addEventListener('click',()=>toggleAgency('DLNR'));
  const wb=document.getElementById('weekButtons');
  wb.innerHTML=`<button class="week-btn active" data-week="">All weeks</button>`+weeks.map(w=>`<button class="week-btn" data-week="${escapeHtml(w)}">${escapeHtml(w)}</button>`).join('');
  wb.addEventListener('click',e=>{let b=e.target.closest('button[data-week]'); if(!b) return; document.getElementById('weekFilter').value=b.dataset.week; document.querySelectorAll('.week-btn').forEach(x=>x.classList.toggle('active',x===b)); renderOperations();});
  const btn=document.getElementById('mobilePanelBtn'), close=document.getElementById('panelCloseBtn'), backdrop=document.getElementById('panelBackdrop'), panel=document.getElementById('sidePanel');
  function openPanel(){panel.classList.add('open'); backdrop.classList.add('open'); setTimeout(()=>map.invalidateSize(),180);}
  function closePanel(){panel.classList.remove('open'); backdrop.classList.remove('open'); setTimeout(()=>map.invalidateSize(),180);}
  btn?.addEventListener('click',openPanel); close?.addEventListener('click',closePanel); backdrop?.addEventListener('click',closePanel);
}
function toggleAgency(a) { if(activeAgencies.has(a) && activeAgencies.size>1) activeAgencies.delete(a); else activeAgencies.add(a); document.getElementById('agencyFilter').value=activeAgencies.size===1?[...activeAgencies][0]:''; syncQuick(); renderOperations(); }
function syncQuick() { document.getElementById('dfmQuick').classList.toggle('active',activeAgencies.has('DFM')); document.getElementById('dlnrQuick').classList.toggle('active',activeAgencies.has('DLNR')); }
function filteredOps() {
  const q=document.getElementById('searchBox').value.toLowerCase().trim();
  const week=document.getElementById('weekFilter').value;
  document.querySelectorAll('.week-btn').forEach(b=>b.classList.toggle('active',b.dataset.week===week));
  return operations.filter(op=>{
    if(!activeAgencies.has(op.agency)) return false;
    if(week && op.week!==week) return false;
    const text=[op.agency,op.date,op.week,op.crew,op.location,op.matched,op.notes].join(' ').toLowerCase();
    if(q && !text.includes(q)) return false;
    return true;
  });
}
function renderOperations() {
  const ops=filteredOps(); markerLayer.clearLayers(); markers.clear();
  ops.forEach(op=>{
    const route = routePathFor(op);
    if (route) {
      const line = L.polyline(route.path, lineStyleFor(op));
      line.bindPopup(popupHtml(op));
      line.bindTooltip(tooltipHtml(op),{sticky:true,className:'hover-tooltip',opacity:.96});
      line.addTo(markerLayer);
      const mid = midpoint(route.path);
      const label = L.marker(mid,{icon:makeLineMarkerIcon(op), interactive:true});
      label.bindPopup(popupHtml(op));
      label.bindTooltip(tooltipHtml(op),{direction:'top',offset:[0,-12],className:'hover-tooltip',opacity:.96});
      label.addTo(markerLayer);
      markers.set(op.id,{kind:'line', line, label, bounds:line.getBounds()});
    } else {
      const marker=L.marker([op.lat,op.lng],{icon:markerIcon(op)});
      marker.bindPopup(popupHtml(op));
      marker.bindTooltip(tooltipHtml(op),{direction:'top',offset:[0,-12],className:'hover-tooltip',opacity:.96});
      marker.addTo(markerLayer);
      markers.set(op.id,{kind:'marker', marker});
    }
  });
  const list=document.getElementById('opList');
  list.innerHTML=ops.slice().sort((a,b)=>a.date.localeCompare(b.date)||a.agency.localeCompare(b.agency)).map(op=>`<div class="op-card" data-id="${op.id}" style="border-left-color:${agencyColors[op.agency]}"><div class="op-name">${escapeHtml(op.location)}</div><div class="op-meta"><strong>${escapeHtml(op.agency)}</strong> · ${escapeHtml(op.date)} · ${escapeHtml(op.week)}${op.crew?' · '+escapeHtml(op.crew):''}<br>${escapeHtml(op.notes)}</div></div>`).join('');
  list.querySelectorAll('.op-card').forEach(card=>card.addEventListener('click',()=>{
    let item=markers.get(Number(card.dataset.id));
    if(!item) return;
    if(item.kind==='line') { map.fitBounds(item.bounds,{padding:[40,40], maxZoom:16}); item.line.openPopup(); }
    else { map.setView(item.marker.getLatLng(),15); item.marker.openPopup(); }
  }));
  const d=ops.filter(o=>o.agency==='DFM').length, s=ops.filter(o=>o.agency==='DLNR').length;
  const lines=ops.filter(o=>routePathFor(o)).length;
  document.getElementById('summaryBox').innerHTML=`Showing <strong>${ops.length}</strong> operation-locations: <strong>${d}</strong> DFM and <strong>${s}</strong> DLNR. <strong>${lines}</strong> street/area items are shown as line segments where the source names a street, canal, promenade, bridge, road, or path; broader locations remain points.`;
}
function fitVisible() {
  const bounds=[];
  [...markers.values()].forEach(item=>{
    if(item.kind==='line') bounds.push(item.bounds.getSouthWest(), item.bounds.getNorthEast());
    else bounds.push(item.marker.getLatLng());
  });
  if(bounds.length) map.fitBounds(L.latLngBounds(bounds),{padding:[35,35]});
}
window.addEventListener('resize',()=>setTimeout(()=>map.invalidateSize(),150));
initMap();
</script>
