:root{--bg:#f7f9fc;--panel:#fff;--ink:#172033;--muted:#5f6b7a;--line:#dbe3ef}

.app{height:100%;display:grid;grid-template-columns:minmax(0,1fr) 380px;grid-template-rows:auto 1fr}
header{grid-column:1/-1;padding:18px 22px;background:linear-gradient(90deg,#0f172a,#1e3a8a);color:#fff;display:flex;justify-content:space-between;gap:20px;align-items:center}
h1{margin:0;font-size:clamp(22px,3vw,36px);letter-spacing:-.03em} .subtitle{color:rgba(255,255,255,.82);font-size:14px;margin-top:4px}
.header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end} .small-chip{border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.12);border-radius:999px;padding:7px 10px;font-size:12px}
.mobile-panel-btn,.panel-close{display:none} #map{min-height:720px;height:100%;width:100%;background:#dbeafe}
aside{background:#fff;border-left:1px solid var(--line);overflow:auto;padding:16px} .panel-title{margin:0 0 8px;font-size:18px}
.search{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:14px;margin-bottom:10px}
.filters{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:12px} select,button{border:1px solid var(--line);border-radius:12px;background:#fff;padding:9px 10px;font-size:13px} button{cursor:pointer;font-weight:700}
.facility-list{display:grid;gap:9px} .facility-card{border:1px solid var(--line);border-left:7px solid #64748b;border-radius:14px;padding:10px 11px;background:#fff;cursor:pointer;transition:.15s ease}
.facility-card:hover{box-shadow:0 8px 18px rgba(15,23,42,.09);transform:translateY(-1px)} .facility-name{font-weight:800;font-size:14px;line-height:1.25} .facility-meta{color:var(--muted);font-size:12px;line-height:1.35;margin-top:4px}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px} .badge{border-radius:999px;background:#eef2ff;color:#334155;padding:2px 7px;font-size:11px;font-weight:700}
.marker-dot{width:19px;height:19px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 5px rgba(15,23,42,.08),0 8px 18px rgba(15,23,42,.22);position:relative}
.marker-fee{position:absolute;right:-9px;top:-9px;width:15px;height:15px;border-radius:999px;background:#111827;color:#fff;font-size:10px;line-height:15px;text-align:center;border:1px solid #fff;font-weight:900}
.marker-animal{position:absolute;left:-10px;bottom:-10px;width:16px;height:16px;border-radius:999px;background:#fff;color:#111827;font-size:11px;line-height:16px;text-align:center;border:1px solid #cbd5e1}
.hover-tooltip{width:440px;max-width:440px;min-width:360px;white-space:normal;background:#0f172a;color:#fff;border:0;border-radius:13px;padding:12px 14px;box-shadow:0 12px 30px rgba(15,23,42,.30);line-height:1.35}
.hover-title{font-weight:900;font-size:15px;margin-bottom:7px} .hover-grid{display:grid;grid-template-columns:86px minmax(0,1fr);column-gap:8px;row-gap:4px} .hover-label{color:#cbd5e1;font-weight:800;font-size:12px;white-space:nowrap} .hover-value{font-size:12px;overflow-wrap:anywhere}
.leaflet-popup-content{font-size:13px;line-height:1.4;min-width:240px} .popup-title{font-weight:900;font-size:15px;margin-bottom:5px} .popup-row{margin:3px 0} .popup-label{color:var(--muted);font-weight:700}
.leaflet-tile{filter:saturate(1.18) contrast(1.06)} .panel-backdrop{display:none}
@media(max-width:980px){html,body{height:100%;overflow:hidden} .app{height:100dvh;min-height:100dvh;grid-template-columns:1fr;grid-template-rows:auto minmax(0,1fr)} header{align-items:flex-start;flex-direction:column;padding:12px 14px;gap:10px} h1{font-size:20px} .subtitle{font-size:12px} .header-actions{width:100%;justify-content:flex-start;gap:6px} .small-chip{font-size:11px;padding:6px 8px} .mobile-panel-btn{display:inline-flex;align-items:center;justify-content:center;min-height:36px;color:#fff;background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.32)} #map{height:100%;min-height:0} aside{position:fixed;left:0;right:0;bottom:0;z-index:2000;max-height:78dvh;min-height:42dvh;overflow:auto;border-left:0;border-top:1px solid var(--line);border-radius:18px 18px 0 0;box-shadow:0 -18px 44px rgba(15,23,42,.24);transform:translateY(calc(100% - 62px));transition:transform .22s ease;padding:14px} aside.open{transform:translateY(0)} .panel-close{display:block;float:right;border-radius:999px;padding:7px 10px;font-size:12px;margin:0 0 8px 8px;min-height:36px} .panel-backdrop.open{display:block;position:fixed;inset:0;z-index:1999;background:rgba(15,23,42,.28)} .search,select{min-height:44px;font-size:16px} .filters button{min-height:44px;font-size:15px} .leaflet-tooltip,.hover-tooltip{display:none!important} .leaflet-popup-content{min-width:220px;max-width:280px}}

const colors={"Emergency Shelter":"#dc2626","Transitional Housing":"#2563eb","Medical Respite":"#16a34a","Behaviorial/Medical Respite":"#0f766e","Behavioral/Medical Respite":"#0f766e","Treatment Center":"#7c3aed","Hospital":"#0284c7","Drop-in Center":"#f59e0b","Permanent Supportive Housing":"#9333ea","Permanent Housing":"#a855f7"};
const defaultColor="#64748b"; let map,markerLayer; const markers=new Map(); const cacheKey="oahuFacilityGeocodesV2";
const esc=v=>String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
function colorFor(t){return colors[t]||defaultColor}
function serviceCategories(f){const t=String(f["Services for"]||"").toLowerCase().replace(/\([^)]*\)/g," ").replace(/&/g,",").replace(/\band\b/g,",");const s=new Set();if(/\byoung\s+adults?\b/.test(t))s.add("Young Adults");if(/\badult\s+men\b/.test(t))s.add("Adult Men");if(/\badult\s+women\b/.test(t))s.add("Adult Women");if(/\bcouples?\b/.test(t))s.add("Couples");if(/\bfamil(?:y|ies)\b/.test(t))s.add("Families");const g=t.replace(/\byoung\s+adults?\b/g," ").replace(/\badult\s+men\b/g," ").replace(/\badult\s+women\b/g," ");if(/\badults?\b/.test(g))s.add("Adults");return [...s]}
function markerIcon(f){const fee=f.hasFee?'<span class="marker-fee">$</span>':"",animal=f.hasAnimal?'<span class="marker-animal">🐕</span>':"";return L.divIcon({className:"",html:`<div class="marker-dot" style="background:${colorFor(f["Facility Type"])}">${fee}${animal}</div>`,iconSize:[26,26],iconAnchor:[13,13],popupAnchor:[0,-10]})}
function popupHtml(f){const rows=[["Agency",f.Agency],["Facility Type",f["Facility Type"]],["Specialty",f.Specialty],["Capacity",f.Capacity],["Services for",f["Services for"]],["Council District",f["City Council District"]],["Fee",f.Fee],["Support/service animals",f["Support/Service Animals"]],["Phone",f.Phone],["Address",f.Address]];return `<div class="popup-title">${esc(f.Name)}</div>`+rows.filter(x=>x[1]).map(x=>`<div class="popup-row"><span class="popup-label">${esc(x[0])}:</span> ${esc(x[1])}</div>`).join("")}
function tooltipHtml(f){const rows=[["Agency",f.Agency],["Type",f["Facility Type"]],["Address",f.Address],["Phone",f.Phone],["Services",f["Services for"]]];return `<div class="hover-title">${esc(f.Name)}</div><div class="hover-grid">`+rows.filter(x=>x[1]).map(x=>`<div class="hover-label">${esc(x[0])}</div><div class="hover-value">${esc(x[1])}</div>`).join("")+`</div>`}
function filters(){return {q:document.getElementById("searchBox").value.toLowerCase(),type:document.getElementById("typeFilter").value,service:document.getElementById("serviceFilter").value,district:document.getElementById("districtFilter").value}}
function matches(f,x){const hay=[f.Name,f.Agency,f.Address,f["Facility Type"],f["Services for"]].join(" ").toLowerCase();return (!x.q||hay.includes(x.q))&&(!x.type||f["Facility Type"]===x.type)&&(!x.service||serviceCategories(f).includes(x.service))&&(!x.district||f["City Council District"]===x.district)}
function render(){markerLayer.clearLayers();markers.clear();const list=document.getElementById("facilityList"),x=filters();list.innerHTML="";const visible=facilities.filter(f=>matches(f,x));for(const f of visible){if(Number.isFinite(f.lat)&&Number.isFinite(f.lng)){const m=L.marker([f.lat,f.lng],{icon:markerIcon(f)}).bindPopup(popupHtml(f)).bindTooltip(tooltipHtml(f),{className:"hover-tooltip",direction:"top",offset:[0,-12],opacity:.96}).addTo(markerLayer);markers.set(f.row,m)}const card=document.createElement("div");card.className="facility-card";card.style.borderLeftColor=colorFor(f["Facility Type"]);card.innerHTML=`<div class="facility-name">${esc(f.Name)}</div><div class="facility-meta">${esc(f.Agency||"")}${f.Agency&&f["Facility Type"]?" · ":""}${esc(f["Facility Type"]||"")}</div><div class="badges">${f["Services for"]?`<span class="badge">${esc(f["Services for"])}</span>`:""}${f.hasFee?'<span class="badge">$ fee</span>':""}${f.hasAnimal?'<span class="badge">🐕 support/service animals</span>':""}</div>`;card.onclick=()=>{const m=markers.get(f.row);if(m){map.setView(m.getLatLng(),15);m.openPopup()}};list.appendChild(card)}}
function fitVisible(){const pts=[...markers.values()].map(m=>m.getLatLng());if(pts.length)map.fitBounds(L.latLngBounds(pts).pad(.12))}
function initControls(){[...new Set(facilities.map(f=>f["Facility Type"]).filter(Boolean))].sort().forEach(v=>typeFilter.add(new Option(v,v)));["Young Adults","Adults","Adult Men","Adult Women","Couples","Families"].forEach(v=>serviceFilter.add(new Option(v,v)));[...new Set(facilities.map(f=>f["City Council District"]).filter(Boolean))].sort((a,b)=>+a-+b).forEach(v=>districtFilter.add(new Option("District "+v,v)));[searchBox,typeFilter,serviceFilter,districtFilter].forEach(e=>e.addEventListener(e===searchBox?"input":"change",render));resetBtn.onclick=()=>{searchBox.value="";typeFilter.value="";serviceFilter.value="";districtFilter.value="";render()};fitBtn.onclick=fitVisible}
async function geocodeMissing(){let cache={};try{cache=JSON.parse(localStorage.getItem(cacheKey)||"{}")}catch{};let changed=false;const missing=facilities.filter(f=>!Number.isFinite(f.lat)||!Number.isFinite(f.lng));for(const f of missing){const key=(f.Address||f.Name).trim();if(!key)continue;if(cache[key]){[f.lat,f.lng]=cache[key];continue}try{const q=encodeURIComponent(key+", Oahu, Hawaii");const u=`https://geocode.arcgis.com/arcgis/rest/services/World/GeocodeServer/findAddressCandidates?SingleLine=${q}&f=json&maxLocations=1&outFields=Match_addr`;const r=await fetch(u);const j=await r.json();const c=j.candidates&&j.candidates[0];if(c&&c.location){f.lat=c.location.y;f.lng=c.location.x;cache[key]=[f.lat,f.lng];changed=true}}catch(e){console.warn("Geocode failed",key,e)}await new Promise(r=>setTimeout(r,180))}if(changed)localStorage.setItem(cacheKey,JSON.stringify(cache));render();fitVisible()}
function init(){map=L.map("map",{center:[21.4389,-157.995],zoom:10,scrollWheelZoom:true});L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"&copy; OpenStreetMap contributors"}).addTo(map);markerLayer=L.layerGroup().addTo(map);initControls();render();fitVisible();geocodeMissing();mobilePanelBtn.onclick=()=>{sidePanel.classList.add("open");panelBackdrop.classList.add("open")};const close=()=>{sidePanel.classList.remove("open");panelBackdrop.classList.remove("open")};panelCloseBtn.onclick=close;panelBackdrop.onclick=close;setTimeout(()=>map.invalidateSize(),250)} init();
</script></body></html>
