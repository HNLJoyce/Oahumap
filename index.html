<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Homeless Resources on Oahu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #f7f9fc;
    --panel: #ffffff;
    --ink: #172033;
    --muted: #5f6b7a;
    --line: #dbe3ef;
    --blue: #1e40af;
  }
  html, body {
    height: 100%;
    margin: 0;
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink);
    background: var(--bg);
  }
  .app {
    height: 100%;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 380px;
    grid-template-rows: auto 1fr;
  }
  header {
    grid-column: 1 / -1;
    padding: 18px 22px;
    background: linear-gradient(90deg, #0f172a, #1e3a8a);
    color: white;
    display: flex;
    justify-content: space-between;
    gap: 20px;
    align-items: center;
  }
  h1 {
    margin: 0;
    font-size: clamp(22px, 3vw, 36px);
    letter-spacing: -0.03em;
  }
  .subtitle {
    color: rgba(255,255,255,.82);
    font-size: 14px;
    margin-top: 4px;
  }
  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .small-chip {
    border: 1px solid rgba(255,255,255,.28);
    background: rgba(255,255,255,.12);
    border-radius: 999px;
    padding: 7px 10px;
    font-size: 12px;
  }
  #map {
    min-height: 720px;
    height: 100%;
    width: 100%;
    background: #dbeafe;
  }
  aside {
    background: var(--panel);
    border-left: 1px solid var(--line);
    overflow: auto;
    padding: 16px;
  }
  .panel-title {
    margin: 0 0 8px 0;
    font-size: 18px;
  }
  .search {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 14px;
    margin-bottom: 10px;
  }
  .filters {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  select, button {
    border: 1px solid var(--line);
    border-radius: 12px;
    background: white;
    padding: 9px 10px;
    font-size: 13px;
  }
  button {
    cursor: pointer;
    font-weight: 700;
  }
  .legend {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px;
    background: #f8fafc;
    margin-bottom: 12px;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 13px;
    margin: 7px 0;
  }
  .swatch {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    border: 2px solid white;
    box-shadow: 0 0 0 1px rgba(15,23,42,.14);
  }
  .facility-list {
    display: grid;
    gap: 9px;
  }
  .facility-card {
    border: 1px solid var(--line);
    border-left: 7px solid #64748b;
    border-radius: 14px;
    padding: 10px 11px;
    background: white;
    cursor: pointer;
    transition: .15s ease;
  }
  .facility-card:hover {
    box-shadow: 0 8px 18px rgba(15,23,42,.09);
    transform: translateY(-1px);
  }
  .facility-name {
    font-weight: 800;
    font-size: 14px;
    line-height: 1.25;
  }
  .facility-meta {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.35;
    margin-top: 4px;
  }
  .badges {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .badge {
    border-radius: 999px;
    background: #eef2ff;
    color: #334155;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 700;
  }
  .marker-dot {
    width: 19px;
    height: 19px;
    border-radius: 50%;
    border: 3px solid white;
    box-shadow: 0 0 0 5px rgba(15,23,42,.08), 0 8px 18px rgba(15,23,42,.22);
    position: relative;
  }
  .marker-fee {
    position: absolute;
    right: -9px;
    top: -9px;
    width: 15px;
    height: 15px;
    border-radius: 999px;
    background: #111827;
    color: #fff;
    font-size: 10px;
    line-height: 15px;
    text-align: center;
    border: 1px solid white;
    font-weight: 900;
  }
  .marker-animal {
    position: absolute;
    left: -10px;
    bottom: -10px;
    width: 16px;
    height: 16px;
    border-radius: 999px;
    background: #fff;
    color: #111827;
    font-size: 11px;
    line-height: 16px;
    text-align: center;
    border: 1px solid #cbd5e1;
  }

  .hover-tooltip {
    width: 440px;
    max-width: 440px;
    min-width: 360px;
    white-space: normal;
    background: #0f172a;
    color: #fff;
    border: 0;
    border-radius: 13px;
    padding: 12px 14px;
    box-shadow: 0 12px 30px rgba(15,23,42,.30);
    line-height: 1.35;
  }
  .hover-tooltip .hover-title {
    font-weight: 900;
    font-size: 15px;
    margin-bottom: 7px;
    letter-spacing: -0.01em;
  }
  .hover-tooltip .hover-grid {
    display: grid;
    grid-template-columns: 86px minmax(0, 1fr);
    column-gap: 8px;
    row-gap: 4px;
    align-items: start;
  }
  .hover-tooltip .hover-label {
    color: #cbd5e1;
    font-weight: 800;
    font-size: 12px;
    white-space: nowrap;
  }
  .hover-tooltip .hover-value {
    color: #ffffff;
    font-size: 12px;
    overflow-wrap: anywhere;
  }
  @media (max-width: 640px) {
    .hover-tooltip {
      width: 320px;
      min-width: 280px;
      max-width: 320px;
    }
    .hover-tooltip .hover-grid {
      grid-template-columns: 76px minmax(0, 1fr);
    }
  }

  .leaflet-popup-content {
    font-size: 13px;
    line-height: 1.4;
    min-width: 240px;
  }
  .popup-title {
    font-weight: 900;
    font-size: 15px;
    margin-bottom: 5px;
  }
  .popup-row {
    margin: 3px 0;
  }
  .popup-label {
    color: var(--muted);
    font-weight: 700;
  }
  @media (max-width: 980px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: auto 620px auto;
    }
    aside {
      border-left: 0;
      border-top: 1px solid var(--line);
      max-height: 520px;
    }
    #map { min-height: 620px; }
    header { align-items: flex-start; flex-direction: column; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>Homeless Resources on Oahu</h1>
      <div class="subtitle">Hover over a facility for key info. Click on it for more details.</div>
    </div>
    <div class="header-actions">
      <span class="small-chip">$ = fee</span>
      <span class="small-chip">🐕 = support/service animals</span>
    </div>
  </header>

  <main id="map"></main>

  <aside>
    <h2 class="panel-title">Find a facility</h2>
    <input class="search" id="searchBox" placeholder="Search by name, agency, address, type..." />
    <div class="filters">
      <select id="typeFilter"><option value="">All types</option></select>
      <select id="districtFilter"><option value="">All districts</option></select>
      <button id="resetBtn">Reset</button>
      <button id="fitBtn">Fit map</button>
    </div>
    <div class="legend" id="legend"></div>
    <div class="facility-list" id="facilityList"></div>
  </aside>
</div>

// Kaaahi/Kuwili shared-building clusters manually tightened: H4+Punawai; Kumu Ola Hou Phase I+II.
// Hale Mauliola visually nudged inland/on-site so it does not render in harbor water on OSM.
// Final address/location correction pass applied: Hale Imi Ola moved onto Kapiolani; Kaaahi/Kuwili and Sand Island clusters reviewed.
const categoryColors = {
  "Emergency Shelter": "#dc2626",
  "Transitional Housing": "#2563eb",
  "Medical Respite": "#16a34a",
  "Behaviorial/Medical Respite": "#0f766e",
  "Treatment Center": "#7c3aed",
  "Hospital": "#0284c7",
  "Drop-in Center": "#f59e0b",
  "Permanent Supportive Housing": "#9333ea"
};
const defaultColor = "#64748b";
let map;
let markerLayer;
let markers = new Map();

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
  }[ch]));
}

function colorFor(type) {
  return categoryColors[type] || defaultColor;
}

function markerIcon(facility) {
  const color = colorFor(facility["Facility Type"]);
  const fee = facility.hasFee ? '<span class="marker-fee">$</span>' : '';
  const animal = facility.hasAnimal ? '<span class="marker-animal">🐕</span>' : '';
  return L.divIcon({
    className: "",
    html: `<div class="marker-dot" style="background:${color};">${fee}${animal}</div>`,
    iconSize: [26, 26],
    iconAnchor: [13, 13],
    popupAnchor: [0, -10]
  });
}

function popupHtml(f) {
  const type = escapeHtml(f["Facility Type"] || "Not listed");
  const capacity = escapeHtml(f["Capacity"] || "Not listed");
  const animal = escapeHtml(f["Support/Service Animals"] || "Not listed");
  const fee = escapeHtml(f["Fee"] || "Not listed");
  const district = escapeHtml(f["City Council District"] || "Not listed");
  const rawSpecialty = f["Specialty"] || f["Specialty "] || "";
  const specialtyRow = rawSpecialty
    ? `<div class="popup-row"><span class="popup-label">Specialty:</span> ${escapeHtml(rawSpecialty)}</div>`
    : "";
  const services = escapeHtml(f["Services for"] || "Not listed");
  const agency = escapeHtml(f["Agency"] || "Not listed");
  const phone = escapeHtml(f["Phone"] || "Not listed");
  const address = escapeHtml(f["Address"] || "Not listed");

  return `
    <div class="popup-title">${escapeHtml(f.Name)}</div>
    <div class="popup-row"><span class="popup-label">Agency:</span> ${agency}</div>
    <div class="popup-row"><span class="popup-label">Type:</span> ${type}</div>
    ${specialtyRow}
    <div class="popup-row"><span class="popup-label">Capacity:</span> ${capacity}</div>
    <div class="popup-row"><span class="popup-label">Services for:</span> ${services}</div>
    <div class="popup-row"><span class="popup-label">Council District:</span> ${district}</div>
    <div class="popup-row"><span class="popup-label">Fee:</span> ${fee}</div>
    <div class="popup-row"><span class="popup-label">Support/service animals:</span> ${animal}</div>
    <div class="popup-row"><span class="popup-label">Phone:</span> ${phone}</div>
    <div class="popup-row"><span class="popup-label">Address:</span> ${address}</div>
  `;
}


function tooltipHtml(f) {
  const name = escapeHtml(f.Name || "");
  const agency = escapeHtml(f.Agency || "");
  const type = escapeHtml(f["Facility Type"] || "");
  const address = escapeHtml(f.Address || "");
  const phone = escapeHtml(f.Phone || "");
  const services = escapeHtml(f["Services for"] || "");

  return `
    <div class="hover-title">${name}</div>
    <div class="hover-grid">
      ${agency ? `<div class="hover-label">Agency</div><div class="hover-value">${agency}</div>` : ""}
      ${type ? `<div class="hover-label">Type</div><div class="hover-value">${type}</div>` : ""}
      ${address ? `<div class="hover-label">Address</div><div class="hover-value">${address}</div>` : ""}
      ${phone ? `<div class="hover-label">Phone</div><div class="hover-value">${phone}</div>` : ""}
      ${services ? `<div class="hover-label">Services</div><div class="hover-value">${services}</div>` : ""}
    </div>
  `;
}

function initMap() {
  map = L.map("map", {
    center: [21.4389, -157.9950],
    zoom: 10,
    scrollWheelZoom: true
  });

  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  markerLayer = L.layerGroup().addTo(map);
  renderControls();
  renderLegend();
  renderFacilities();
  setTimeout(() => map.invalidateSize(), 250);
}

function renderControls() {
  const types = [...new Set(facilities.map(f => f["Facility Type"]).filter(Boolean))].sort();
  const districts = [...new Set(facilities.map(f => f["City Council District"]).filter(Boolean))].sort((a,b) => Number(a)-Number(b));

  const typeFilter = document.getElementById("typeFilter");
  types.forEach(type => {
    const opt = document.createElement("option");
    opt.value = type;
    opt.textContent = type;
    typeFilter.appendChild(opt);
  });

  const districtFilter = document.getElementById("districtFilter");
  districts.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d;
    opt.textContent = "District " + d;
    districtFilter.appendChild(opt);
  });

  document.getElementById("searchBox").addEventListener("input", renderFacilities);
  typeFilter.addEventListener("change", renderFacilities);
  districtFilter.addEventListener("change", renderFacilities);
  document.getElementById("resetBtn").addEventListener("click", () => {
    document.getElementById("searchBox").value = "";
    typeFilter.value = "";
    districtFilter.value = "";
    renderFacilities();
  });
  document.getElementById("fitBtn").addEventListener("click", () => fitVisible());
}

function renderLegend() {
  const legend = document.getElementById("legend");
  const types = [...new Set(facilities.map(f => f["Facility Type"]).filter(Boolean))].sort();
  legend.innerHTML = types.map(type => `
    <div class="legend-row">
      <span class="swatch" style="background:${colorFor(type)}"></span>
      <span>${escapeHtml(type)}</span>
    </div>
  `).join("");
}

function currentFiltered() {
  const q = document.getElementById("searchBox").value.toLowerCase().trim();
  const type = document.getElementById("typeFilter").value;
  const district = document.getElementById("districtFilter").value;

  return facilities.filter(f => {
    const text = [
      f.Name, f.Agency, f["Facility Type"], f["Specialty"], f["Specialty "], f.Address,
      f.Phone, f["Services for"], f.Fee, f["Support/Service Animals"]
    ].join(" ").toLowerCase();

    if (q && !text.includes(q)) return false;
    if (type && f["Facility Type"] !== type) return false;
    if (district && f["City Council District"] !== district) return false;
    return true;
  });
}

function renderFacilities() {
  const filtered = currentFiltered();
  markerLayer.clearLayers();
  markers.clear();

  filtered.forEach((f, idx) => {
    const marker = L.marker([f.lat, f.lng], { icon: markerIcon(f) })
      .bindPopup(popupHtml(f))
      .bindTooltip(tooltipHtml(f), { direction: "top", offset: [0, -12], className: "hover-tooltip", opacity: 0.96 });
    marker.addTo(markerLayer);
    markers.set(f.row, marker);
  });

  const list = document.getElementById("facilityList");
  list.innerHTML = filtered.map(f => `
    <div class="facility-card" data-row="${f.row}" style="border-left-color:${colorFor(f["Facility Type"])}">
      <div class="facility-name">${escapeHtml(f.Name)}</div>
      <div class="facility-meta">${escapeHtml(f["Facility Type"] || "Not listed")} · District ${escapeHtml(f["City Council District"] || "N/A")}</div>
      <div class="facility-meta">${escapeHtml(f.Address || "")}</div>
      <div class="badges">
        ${f.hasFee ? '<span class="badge">$ fee</span>' : ''}
        ${f.hasAnimal ? '<span class="badge">🐕 support/service animals</span>' : ''}
        ${f["Services for"] ? `<span class="badge">${escapeHtml(f["Services for"])}</span>` : ''}
      </div>
    </div>
  `).join("");

  list.querySelectorAll(".facility-card").forEach(card => {
    card.addEventListener("click", () => {
      const row = Number(card.dataset.row);
      const marker = markers.get(row);
      const f = filtered.find(item => item.row === row);
      if (marker && f) {
        map.setView([f.lat, f.lng], 15);
        marker.openPopup();
      }
    });
  });

  fitVisible();
}

function fitVisible() {
  const filtered = currentFiltered();
  if (!filtered.length) return;
  const bounds = L.latLngBounds(filtered.map(f => [f.lat, f.lng]));
  map.fitBounds(bounds, { padding: [40, 40], maxZoom: 12 });
}

document.addEventListener("DOMContentLoaded", initMap);
</script>
</body>
</html>
