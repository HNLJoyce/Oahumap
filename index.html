<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
const facilities=JSON.parse(document.getElementById('facilityData').textContent);const fallback=document.getElementById('fallback');
const colors={'Emergency Shelter':'#2563eb','Transitional Housing':'#f59e0b','Treatment Center':'#be123c','Medical Respite':'#dc2626','Behaviorial/Medical Respite':'#ea580c','Drop-in Center':'#7c3aed'};
const letters={'Emergency Shelter':'E','Transitional Housing':'T','Treatment Center':'Tx','Medical Respite':'M','Behaviorial/Medical Respite':'M','Drop-in Center':'D'};
function esc(v){return String(v??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
function val(v){if(v===null||v===undefined||v==='')return '—';return esc(v).replace(/\n/g, '<br>');}
const dogSvg='<svg viewBox="0 0 64 64" aria-hidden="true"><path fill="currentColor" d="M17 35c0-8 5-15 13-18 6-2 14-1 19 4l6-5c2-2 5-1 5 2v9c0 3-2 5-5 6l-5 2c-2 7-8 12-17 12h-3l-6 6c-2 2-5 1-5-2v-6c-1-1-2-2-2-4z"/><path fill="#fff" d="M41 28c0 2 2 4 4 4s4-2 4-4-2-4-4-4-4 2-4 4z"/><circle cx="45" cy="28" r="1.8" fill="currentColor"/><path fill="#fff" d="M51 35c-2 4-7 7-13 7-3 0-5-1-7-2 3 5 8 8 14 8 6 0 11-4 13-10z"/></svg>';
function hoverHtml(f){return '<div class="tt"><span class="tt-title">'+val(f.Name)+'</span><b>Agency:</b> '+val(f.Agency)+'<br><b>Facility Type:</b> '+val(f['Facility Type'])+'<br><b>Address:</b> '+val(f.Address)+'<br><b>Phone:</b> '+val(f.Phone)+'<br><b>Services for:</b> '+val(f['Services for'])+'</div>';}
function grid(fields){return fields.map(r=>'<div class="k">'+esc(r[0])+'</div><div>'+val(r[1])+'</div>').join('');}
function popupHtml(f){const fields=[['Name',f.Name],['Agency',f.Agency],['Facility Type',f['Facility Type']],['Address',f.Address],['Phone',f.Phone],['Services for',f['Services for']],['Capacity',f.Capacity],['Support/Service Animals',f['Support/Service Animals']],['Fee',f.Fee],['City Council District',f['City Council District']],['Specialty',f.Specialty]];return '<div class="popup-title">'+val(f.Name)+'</div><div class="popup-grid">'+grid(fields)+'</div>';}
function detailHtml(f){const fields=[['Address',f.Address],['Phone',f.Phone],['Services for',f['Services for']],['Capacity',f.Capacity],['Support/Service Animals',f['Support/Service Animals']],['Fee',f.Fee],['City Council District',f['City Council District']],['Specialty',f.Specialty]];return '<h2>'+val(f.Name)+'</h2><p>'+val(f.Agency)+' · '+val(f['Facility Type'])+'</p><div class="detail-grid">'+grid(fields)+'</div>';}
function markerHtml(f){const bg=colors[f['Facility Type']]||'#475569';const letter=letters[f['Facility Type']]||'•';const fee=f.hasFee?'<span class="badge fee">$</span>':'';const dog=f.hasDog?'<span class="badge dog">'+dogSvg+'</span>':'';return '<div class="marker" style="background:'+bg+'">'+esc(letter)+fee+dog+'</div>';}
const agencies=[...new Set(facilities.map(f=>f.Agency).filter(Boolean))].sort();const types=[...new Set(facilities.map(f=>f['Facility Type']).filter(Boolean))].sort();const districts=[...new Set(facilities.map(f=>String(f['City Council District'])).filter(v=>v&&v!=='nan'))].sort((a,b)=>Number(a)-Number(b));
const agencyFilter=document.getElementById('agencyFilter'),typeFilter=document.getElementById('typeFilter'),districtFilter=document.getElementById('districtFilter');agencies.forEach(v=>agencyFilter.insertAdjacentHTML('beforeend','<option value="'+esc(v)+'">'+esc(v)+'</option>'));types.forEach(v=>typeFilter.insertAdjacentHTML('beforeend','<option value="'+esc(v)+'">'+esc(v)+'</option>'));districts.forEach(v=>districtFilter.insertAdjacentHTML('beforeend','<option value="'+esc(v)+'">'+esc(v)+'</option>'));document.getElementById('agencyCount').textContent=agencies.length;document.getElementById('districtCount').textContent=districts.length;
document.getElementById('legend').innerHTML=types.map(t=>'<span class="legend-item"><span class="swatch" style="background:'+(colors[t]||'#475569')+'">'+esc(letters[t]||'•')+'</span>'+esc(t)+'</span>').join('')+'<span class="legend-item legend-dog">'+dogSvg+' Support/Service Animals</span><span class="legend-item"><span class="swatch" style="background:#111827">$</span> Fee listed</span>';
let map=null,markerLayer=null,visibleFacilities=[];function filtered(){const q=document.getElementById('searchBox').value.trim().toLowerCase();return facilities.filter(f=>(!q||String(f.search||'').toLowerCase().includes(q))&&(agencyFilter.value==='All agencies'||f.Agency===agencyFilter.value)&&(typeFilter.value==='All facility types'||f['Facility Type']===typeFilter.value)&&(districtFilter.value==='All districts'||String(f['City Council District'])===districtFilter.value));}
function selectFacility(f){document.getElementById('detailBox').innerHTML=detailHtml(f);}
function renderListOnly(){visibleFacilities=filtered();document.getElementById('shownCount').textContent=visibleFacilities.length;const list=document.getElementById('facilityList');list.innerHTML='';visibleFacilities.forEach(f=>{const item=document.createElement('div');item.className='item';item.innerHTML='<b>'+val(f.Name)+'</b><small>'+val(f.Agency)+' · '+val(f['Facility Type'])+'</small><small>'+val(f.Address)+'</small><small>'+val(f['Services for'])+'</small>';item.addEventListener('click',()=>selectFacility(f));list.appendChild(item);});}
function fitShown(){if(!map||!visibleFacilities.length)return;map.fitBounds(L.latLngBounds(visibleFacilities.map(f=>[Number(f.lat),Number(f.lng)])).pad(.18));}
function render(){renderListOnly();if(!map||!markerLayer)return;markerLayer.clearLayers();visibleFacilities.forEach(f=>{const marker=L.marker([Number(f.lat),Number(f.lng)],{icon:L.divIcon({html:markerHtml(f),className:'',iconSize:[34,34],iconAnchor:[17,17],popupAnchor:[0,-12]})}).addTo(markerLayer);marker.bindTooltip(hoverHtml(f),{sticky:true,direction:'top',opacity:.98});marker.bindPopup(popupHtml(f),{maxWidth:360});marker.on('click',()=>selectFacility(f));});}
function initMap(){if(!window.L){fallback.style.display='block';renderListOnly();return;}map=L.map('map',{zoomControl:true,minZoom:9,maxZoom:18}).setView([21.47,-157.98],10);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap contributors'}).addTo(map);map.setMaxBounds(L.latLngBounds([[21.18,-158.35],[21.78,-157.55]]).pad(.25));markerLayer=L.layerGroup().addTo(map);render();fitShown();}
['searchBox','agencyFilter','typeFilter','districtFilter'].forEach(id=>{document.getElementById(id).addEventListener('input',render);document.getElementById(id).addEventListener('change',render);});document.getElementById('fitBtn').addEventListener('click',fitShown);document.getElementById('clearBtn').addEventListener('click',()=>{document.getElementById('searchBox').value='';agencyFilter.value='All agencies';typeFilter.value='All facility types';districtFilter.value='All districts';render();fitShown();});
initMap();
})();
</script>
